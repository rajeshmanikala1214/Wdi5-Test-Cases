# ══════════════════════════════════════════════════════════════
# sonar-project.properties
# Place this file in the ROOT of your Git repository
# (same level as package.json)
# ══════════════════════════════════════════════════════════════

# ── Project identity ──────────────────────────────────────────
sonar.projectKey=UI5-E2E-Tests
sonar.projectName=UI5 E2E Tests (WDI5 + OPA5 + UiVeri5)
sonar.projectVersion=1.0

# ── Source & test paths ───────────────────────────────────────
sonar.sources=webapp
sonar.tests=webapp/test

# Files to exclude from SOURCE analysis
sonar.exclusions=\
  **/node_modules/**,\
  **/reports/**,\
  **/*.min.js,\
  webapp/test/**

# Files that count as TEST sources (wdio / opa5 / uiveri5 specs)
sonar.test.inclusions=\
  webapp/test/**/*.test.js,\
  webapp/test/**/*.spec.js,\
  webapp/test/**/conf.js

# ── Language ──────────────────────────────────────────────────
sonar.language=js
sonar.sourceEncoding=UTF-8

# ── Test execution results ────────────────────────────────────
# Generic format – shows PASSED / FAILED / SKIPPED counts in SonarQube
# dashboard under "Tests" tab.  Generated by scripts/convert-to-sonar-generic.js
sonar.testExecutionReportPaths=reports/sonar/test-execution.xml

# ── Code coverage ─────────────────────────────────────────────
# LCOV format generated by nyc during WDI5 stage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── JUnit (optional fallback – some SQ versions read this too) ─
sonar.junit.reportPaths=reports/junit/combined/all-results.xml