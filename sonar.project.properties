# ─────────────────────────────────────────────────────────────────────────────
# sonar-project.properties
# SonarQube configuration for UI5 E2E Test Suite
# Covers: WDI5 · OPA5 · UiVeri5
# ─────────────────────────────────────────────────────────────────────────────

sonar.projectKey=UI5-E2E-Tests
sonar.projectName=UI5 E2E Tests (WDI5 + OPA5 + UiVeri5)
sonar.projectVersion=1.0

# ── Sources & Tests ──────────────────────────────────────────────────────────
sonar.sources=webapp
sonar.tests=webapp/test
sonar.sourceEncoding=UTF-8

# ── Exclusions ───────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/reports/**,\
  **/*.min.js,\
  **/coverage/**,\
  **/dist/**

sonar.test.inclusions=\
  webapp/test/**/*.test.js,\
  webapp/test/**/*.spec.js,\
  webapp/test/**/conf.js

# ── JUnit XML Reports (all three frameworks) ─────────────────────────────────
# SonarQube reads JUnit XML to display test results in the dashboard
sonar.junit.reportPaths=\
  reports/junit/wdi5,\
  reports/junit/opa5,\
  reports/junit/uiveri5

# ── Code Coverage (lcov generated by Istanbul / nyc) ─────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Language ─────────────────────────────────────────────────────────────────
sonar.language=js
sonar.javascript.file.suffixes=.js,.jsx,.mjs